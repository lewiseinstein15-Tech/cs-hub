<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CS HUB - Labs</title>
    <!-- [Keep your existing links and styles exactly as they were] -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... [Insert your original CSS here] ... */
        /* Ensure the visibility classes are not fighting your existing styles */
        .admin-controls { display: flex !important; }
        .add-lab-form.visible { display: block !important; }
        .btn-toggle-form.visible { display: inline-block !important; }
    </style>
</head>
<body>
    <!-- ... [Insert your original HTML body structure here] ... -->

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
            authDomain: "cs-hub-7c97b.firebaseapp.com",
            projectId: "cs-hub-7c97b",
            storageBucket: "cs-hub-7c97b.firebasestorage.app",
            messagingSenderId: "76338162904",
            appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // ADMIN CONFIGURATION
        const ADMIN_EMAIL = "lewiseinstein15@gmail.com";
        let isAdminUser = false;

        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.href = "login.html"; return; }

            // Forced lowercase check to prevent login/email mismatch
            const userEmail = user.email ? user.email.toLowerCase().trim() : '';
            isAdminUser = (userEmail === ADMIN_EMAIL.toLowerCase().trim());

            console.log('Logged in as:', userEmail);
            console.log('Is Admin:', isAdminUser);

            // Force visibility of Admin elements if user is admin
            if (isAdminUser) {
                document.getElementById('toggleFormBtn').classList.add('visible');
                document.getElementById('userRole').textContent = '🔑 Admin';
            }

            loadLabs();
        });

        // Toggle function
        function toggleAddForm() {
            const form = document.getElementById('addLabForm');
            form.classList.toggle('visible');
        }

        // Load Labs logic
        function loadLabs() {
            db.collection('labs').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                const grid = document.getElementById('labsGrid');
                grid.innerHTML = '';
                snapshot.forEach((doc) => {
                    const lab = doc.data();
                    const card = document.createElement('div');
                    card.className = 'lab-card';
                    card.innerHTML = `
                        <h3>${lab.title}</h3>
                        <p>${lab.unit}</p>
                        ${isAdminUser ? `<button onclick="deleteLab('${doc.id}')">Delete</button>` : ''}
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function deleteLab(id) {
            if (confirm('Delete this lab?')) {
                db.collection('labs').doc(id).delete();
            }
        }
    </script>
</body>
</html>
