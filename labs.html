<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB - Labs</title>
    <style>
        /* Keeping your existing styles, but adding visibility control */
        :root { --bg: #030611; --card-bg: rgba(10, 15, 36, 0.7); --border: rgba(255, 255, 255, 0.08); --white: #ffffff; }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; }
        .hidden { display: none !important; }
        .add-lab-form { display: none; padding: 20px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; }
        .add-lab-form.visible { display: block; }
        .btn-toggle-form { display: none; padding: 10px; background: #3B82F6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-toggle-form.visible { display: block; }
        .labs-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .lab-card { background: var(--card-bg); padding: 20px; border: 1px solid var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>🧪 Labs</h1>
        
        <!-- Admin Toggle Button -->
        <button id="toggleFormBtn" class="btn-toggle-form" onclick="toggleAddForm()">➕ Add New Lab</button>

        <!-- Admin Form -->
        <div id="addLabForm" class="add-lab-form">
            <h3>Add New Lab</h3>
            <input type="text" id="labTitle" placeholder="Lab Title">
            <input type="text" id="labUnit" placeholder="Unit Code">
            <button onclick="addLab()">Submit Lab</button>
        </div>

        <div id="labsGrid" class="labs-grid"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
            authDomain: "cs-hub-7c97b.firebaseapp.com",
            projectId: "cs-hub-7c97b",
            storageBucket: "cs-hub-7c97b.firebasestorage.app",
            messagingSenderId: "76338162904",
            appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAIL = "lewiseinstein15@gmail.com";
        let isAdminUser = false;

        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.href = "login.html"; return; }

            const userEmail = user.email ? user.email.toLowerCase().trim() : '';
            isAdminUser = (userEmail === ADMIN_EMAIL.toLowerCase().trim());

            console.log("Logged in as:", userEmail);
            console.log("Is Admin:", isAdminUser);

            if (isAdminUser) {
                document.getElementById('toggleFormBtn').classList.add('visible');
            }

            loadLabs();
        });

        function toggleAddForm() {
            document.getElementById('addLabForm').classList.toggle('visible');
        }

        function addLab() {
            if (!isAdminUser) return;
            const title = document.getElementById('labTitle').value;
            const unit = document.getElementById('labUnit').value;

            db.collection('labs').add({
                title: title,
                unit: unit,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert('Lab Added!');
                toggleAddForm();
            });
        }

        function loadLabs() {
            db.collection('labs').onSnapshot((snapshot) => {
                const grid = document.getElementById('labsGrid');
                grid.innerHTML = '';
                snapshot.forEach((doc) => {
                    const lab = doc.data();
                    const card = document.createElement('div');
                    card.className = 'lab-card';
                    card.innerHTML = `
                        <h3>${lab.title}</h3>
                        <p>Unit: ${lab.unit}</p>
                        ${isAdminUser ? `<button onclick="deleteLab('${doc.id}')">Delete</button>` : ''}
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function deleteLab(id) {
            if (confirm('Delete this lab?')) {
                db.collection('labs').doc(id).delete();
            }
        }
    </script>
</body>
</html>
