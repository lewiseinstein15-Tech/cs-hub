<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB - Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- CORE FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #030611;
            --sidebar: #060919;
            --card: rgba(10, 15, 36, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --blue: #3B82F6;
            --cyan: #06B6D4;
            --red: #EF4444;
            --text: #ffffff;
            --dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; }

        /* Sidebar UI */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 25px 20px; display: flex; flex-direction: column; }
        .brand h1 { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--blue), var(--cyan)); -webkit-background-clip: text; color: transparent; letter-spacing: 1px; }
        .brand span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--blue); display: block; margin-top: 2px; }
        .menu { list-style: none; margin-top: 40px; display: flex; flex-direction: column; gap: 8px; }
        .menu a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--dim); text-decoration: none; font-size: 14px; border-radius: 8px; }
        .menu .active a, .menu a:hover { color: var(--text); background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }

        /* Workspace Main Panel */
        .main-panel { flex-grow: 1; display: flex; flex-direction: column; }
        .topbar { height: 75px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: rgba(6, 9, 25, 0.3); backdrop-filter: blur(10px); }
        .topbar h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; }
        .btn-action { background: var(--blue); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .btn-action:hover { background: #2563EB; }

        /* Content Grid */
        .content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-code { font-family: 'JetBrains Mono', monospace; color: var(--cyan); font-size: 12px; font-weight: bold; margin-bottom: 6px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .card-desc { font-size: 12px; color: var(--dim); line-height: 1.5; margin-bottom: 15px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; font-size: 11px; }
        .btn-del { background: transparent; border: none; color: var(--red); cursor: pointer; font-weight: 600; }
        .status-msg { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--dim); font-size: 14px; }

        /* Form Modal Window */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-box { background: #090d22; border: 1px solid var(--border); padding: 30px; border-radius: 16px; width: 100%; max-width: 420px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 10px; color: #fff; border-radius: 6px; font-family: inherit; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-close { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
        
        #crashBanner { display: none; background: var(--red); color: white; padding: 12px; position: fixed; bottom: 0; left: 0; right: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; text-align: center; z-index: 99999; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <h1>CS HUB</h1>
            <span>ADMIN SYSTEM</span>
        </div>
        <ul class="menu">
            <li><a href="admin-dashboard.html">📊 Dashboard</a></li>
            <li><a href="notes.html">📚 Notes Control</a></li>
            <li class="active"><a href="admin-units.html">🎓 Units Engine</a></li>
            <li><a href="ai-system.html">🤖 AI Console</a></li>
            <li><a href="revision.html">📝 Revision Repo</a></li>
        </ul>
    </aside>

    <!-- MAIN PANEL -->
    <main class="main-panel">
        <header class="topbar">
            <h2>Units Control Node</h2>
            <button class="btn-action" onclick="viewModal(true)">＋ Register Unit</button>
        </header>
        <div class="content">
            <div class="grid" id="mainGrid">
                <div class="status-msg">Opening secure pipeline link...</div>
            </div>
        </div>
    </main>

    <!-- ENTRY MODAL -->
    <div class="modal" id="inputModal">
        <div class="modal-box">
            <h3 style="margin-bottom:15px; font-family:'Orbitron'; color:var(--cyan)">Map Architecture Unit</h3>
            <form id="unitForm" onsubmit="addData(event)">
                <div class="form-group"><label>Unit Code</label><input type="text" id="inCode" placeholder="e.g. CSC1110" required></div>
                <div class="form-group"><label>Unit Title</label><input type="text" id="inTitle" placeholder="e.g. Discrete Structures" required></div>
                <div class="form-group"><label>Year Tier</label>
                    <select id="inYear">
                        <option value="Year 1">Year 1</option>
                        <option value="Year 2">Year 2</option>
                        <option value="Year 3">Year 3</option>
                        <option value="Year 4">Year 4</option>
                    </select>
                </div>
                <div class="form-group"><label>Architecture Description</label><textarea id="inDesc" rows="3" required></textarea></div>
                <div class="modal-btns">
                    <button type="button" class="btn-close" onclick="viewModal(false)">Cancel</button>
                    <button type="submit" class="btn-action">Save Node</button>
                </div>
            </form>
        </div>
    </div>

    <!-- RUNTIME ERROR ELEMENT -->
    <div id="crashBanner"></div>

    <script>
        window.onerror = function(m, u, l) {
            const b = document.getElementById("crashBanner");
            if(b) { b.style.display = "block"; b.innerText = "Fatal: " + m + " Line: " + l; }
            return false;
        };

        const config = {
            apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
            authDomain: "cs-hub-7c97b.firebaseapp.com",
            projectId: "cs-hub-7c97b",
            storageBucket: "cs-hub-7c97b.firebasestorage.app",
            messagingSenderId: "76338162904",
            appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
        };

        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const firestoreDB = firebase.firestore();

        function viewModal(show) {
            const el = document.getElementById("inputModal");
            if(show) el.classList.add("show");
            else { el.classList.remove("show"); document.getElementById("unitForm").reset(); }
        }

        firestoreDB.collection("units").onSnapshot((snap) => {
            const target = document.getElementById("mainGrid");
            if(!target) return;

            if (snap.empty) {
                target.innerHTML = '<div class="status-msg">No active units inside Cloud database. Click Register Unit to add one.</div>';
                return;
            }

            target.innerHTML = "";
            snap.forEach((doc) => {
                const item = doc.data();
                const cardNode = document.createElement("div");
                cardNode.className = "card";
                cardNode.innerHTML = `
                    <div>
                        <div class="card-code">${clean(item.code)}</div>
                        <div class="card-title">${clean(item.title)}</div>
                        <div class="card-desc">${clean(item.desc)}</div>
                    </div>
                    <div class="card-footer">
                        <span style="background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px;">${clean(item.year || 'Year 1')}</span>
                        <button class="btn-del" onclick="removeNode('${doc.id}')">Delete</button>
                    </div>`;
                target.appendChild(cardNode);
            });
        }, err => {
            document.getElementById("mainGrid").innerHTML = `<div class="status-msg" style="color:var(--red)">Sync Interrupted: ${err.message}</div>`;
        });

        function addData(e) {
            e.preventDefault();
            firestoreDB.collection("units").add({
                code: document.getElementById("inCode").value.trim(),
                title: document.getElementById("inTitle").value.trim(),
                year: document.getElementById("inYear").value,
                desc: document.getElementById("inDesc").value.trim(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => viewModal(false))
            .catch(err => alert("Data blocked: " + err.message));
        }

        function removeNode(id) {
            if(confirm("Confirm deletion of this dataset mapping?")) {
                firestoreDB.collection("units").doc(id).delete()
                .catch(err => alert("Action denied: " + err.message));
            }
        }

        function clean(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
        }
    </script>
</body>
</html>
