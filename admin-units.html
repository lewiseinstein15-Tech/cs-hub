<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB - Diagnostic Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030611; color: white; font-family: 'Inter', sans-serif; padding: 40px; text-align: center; }
        .card { background: rgba(10, 15, 36, 0.7); border: 1px solid rgba(255,255,255,0.08); padding: 30px; border-radius: 12px; max-width: 500px; margin: 40px auto; }
        h1 { font-family: 'Orbitron', sans-serif; color: #06B6D4; }
        .btn { background: #3B82F6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>CS HUB DIAGNOSTIC MODE</h1>
    <p>If you can see this screen, your HTML rendering engine works perfectly.</p>

    <div class="card">
        <h3>Local Units Registry (Bypass Mode)</h3>
        <p style="color: #6b7280; margin: 10px 0;">Firebase connection temporarily paused for stability test.</p>
        <div id="testGrid" style="text-align: left; margin-top: 20px;">
            <!-- Content loaded via safe script -->
        </div>
        <button class="btn" onclick="alert('System UI is responsive!')">Test Button Interaction</button>
    </div>

    <script>
        // Completely offline safe rendering execution
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("testGrid");
            if(grid) {
                grid.innerHTML = `
                    <div style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 6px; margin-bottom: 8px;">
                        <strong>📚 Discrete Structures</strong> (Unit-discrete-structures.html)

                    </div>
                `;
            }
        });
    </script>
</body>
