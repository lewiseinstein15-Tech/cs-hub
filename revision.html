<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Revision Materials - CS HUB</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
            authDomain: "cs-hub-7c97b.firebaseapp.com",
            databaseURL: "https://cs-hub-7c97b-default-rtdb.firebaseio.com",
            projectId: "cs-hub-7c97b",
            storageBucket: "cs-hub-7c97b.appspot.com",
            messagingSenderId: "76338162904",
            appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const adminControls = document.getElementById('adminControls');
            if (user && user.email === siteConfig.adminEmail) {
                adminControls.style.display = "block"; // Show for Admin
            } else {
                adminControls.style.display = "none"; // Hide for Users
            }
        });
    </script>
</head>
<body>
    <h1>Revision Materials</h1>

    <!-- Organized Sections for All Users -->
    <section id="books">
        <h2>📚 Books & Guides</h2>
        <!-- Add your book links here -->
    </section>

    <section id="youtube">
        <h2>📺 YouTube Tutorials</h2>
        <!-- Add your YouTube links here -->
    </section>

    <section id="lectures">
        <h2>🎥 Lecture Videos</h2>
        <!-- Add your lecture video links here -->
    </section>

    <section id="exams">
        <h2>📝 Exams & CATs</h2>
        <!-- Add your exam papers here -->
    </section>

    <!-- Admin-Only Update Panel -->
    <section id="adminControls" style="display:none; background: #222; padding: 20px; border-radius: 10px; margin-top: 40px;">
        <h3 style="color: #3B82F6;">Admin Update Panel</h3>
        <p>You have permission to edit these sections.</p>
        <button onclick="window.open('https://github.com/lewiseinstein5/CS-HUB/edit/main/revision.html', '_blank')">
            Add/Update Materials on GitHub
        </button>
    </section>
</body>
</html>
