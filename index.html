<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CS HUB OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050816;
--blue:#3B82F6;
--cyan:#06B6D4;
--purple:#8B5CF6;
--green:#22C55E;
--white:#ffffff;
--glass:rgba(255,255,255,.05);
--border:rgba(255,255,255,.12);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
height:100vh;
overflow:hidden;
background:var(--bg);
color:white;
font-family:Inter,sans-serif;
}


/* Background glow */

.background{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(59,130,246,.25),transparent 40%),
radial-gradient(circle at 80% 80%,rgba(6,182,212,.25),transparent 40%),
radial-gradient(circle at 50% 50%,rgba(139,92,246,.15),transparent 50%);
}


/* Code rain */

#codeRain{
position:fixed;
inset:0;
overflow:hidden;
opacity:.25;
font-family:"JetBrains Mono";
color:#3B82F6;
}


/* Boot screen */

#boot{
position:fixed;
inset:0;
z-index:10;
display:flex;
align-items:center;
justify-content:center;
background:#050816;
}


.boot-box{

width:380px;
padding:35px;
border-radius:25px;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(20px);
text-align:center;

}


.logo{

font-family:"JetBrains Mono";
font-size:35px;
font-weight:800;
letter-spacing:4px;

background:linear-gradient(90deg,var(--blue),var(--cyan));
-webkit-background-clip:text;
color:transparent;

}


.boot-text{

margin-top:20px;
font-size:13px;
color:rgba(255,255,255,.6);
font-family:"JetBrains Mono";

}


.loading{

height:6px;
background:rgba(255,255,255,.1);
border-radius:10px;
margin-top:25px;
overflow:hidden;

}


.loading span{

display:block;
height:100%;
width:0%;
background:linear-gradient(90deg,var(--blue),var(--cyan));
animation:load 4s forwards;

}


@keyframes load{

to{
width:100%;
}

}


/* Login area */

#app{

display:none;
height:100vh;
align-items:center;
justify-content:center;
padding:20px;

}


.card{

width:400px;
padding:35px;
border-radius:25px;

background:var(--glass);
border:1px solid var(--border);

backdrop-filter:blur(25px);

box-shadow:
0 0 50px rgba(59,130,246,.15);

}


.brand{

text-align:center;
margin-bottom:30px;

}


.brand h1{

font-family:"JetBrains Mono";
font-size:28px;

background:linear-gradient(90deg,var(--blue),var(--cyan));
-webkit-background-clip:text;
color:transparent;

}


.brand p{

font-size:12px;
color:rgba(255,255,255,.5);
margin-top:8px;

}


input{

width:100%;
padding:14px;
margin-bottom:15px;

border-radius:12px;

background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.15);

color:white;
outline:none;

}


button{

width:100%;
padding:14px;

border:none;
border-radius:12px;

background:linear-gradient(90deg,var(--blue),var(--cyan));

color:white;

font-weight:700;
cursor:pointer;

}


button:hover{

transform:translateY(-2px);

}


.link{

text-align:center;
margin-top:20px;
font-size:13px;
color:var(--cyan);
cursor:pointer;

}


.hidden{

display:none;

}

</style>

</head>

<body>

<div class="background"></div>

<div id="codeRain"></div>


<div id="boot">

<div class="boot-box">

<div class="logo">
CS HUB OS
</div>

<div class="boot-text" id="bootText">
Initializing Computer Science Ecosystem...
</div>


<div class="loading">
<span></span>
</div>

</div>

</div>


<div id="app">


<div class="card">

<div class="brand">

<h1>
CS HUB
</h1>

<p>
Computer Science Learning Ecosystem
</p>

</div><div id="loginSection">

<input id="loginEmail" type="email" placeholder="Email">

<input id="loginPassword" type="password" placeholder="Password">


<button onclick="loginUser()">
LOGIN
</button>


<div class="link" onclick="showRegister()">
Don't have an account? Create Account
</div>


<div class="link" onclick="resetPassword()">
Forgot Password?
</div>

</div>



<div id="registerSection" class="hidden">


<input id="registerName" type="text" placeholder="Full Name">


<input id="registerEmail" type="email" placeholder="Email">


<input id="registerPassword" type="password" placeholder="Password">


<button onclick="createAccount()">
CREATE ACCOUNT
</button>


<div class="link" onclick="showLogin()">
Already have an account? Login
</div>


</div>


</div>

</div>



<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


<script>


const firebaseConfig = {

apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",

authDomain: "cs-hub-7c97b.firebaseapp.com",

projectId: "cs-hub-7c97b",

storageBucket: "cs-hub-7c97b.firebasestorage.app",

messagingSenderId: "76338162904",

appId: "1:76338162904:web:3be60e1952d49c8fb63bad"

};


firebase.initializeApp(firebaseConfig);


const auth = firebase.auth();

const db = firebase.firestore();



const ADMIN_EMAIL = "lewiseinstein15@gmail.com";



setTimeout(()=>{

document.getElementById("boot").style.display="none";

document.getElementById("app").style.display="flex";

},4000);



function showRegister(){

document.getElementById("loginSection").classList.add("hidden");

document.getElementById("registerSection").classList.remove("hidden");

}



function showLogin(){

document.getElementById("registerSection").classList.add("hidden");

document.getElementById("loginSection").classList.remove("hidden");

}



async function createAccount(){


const name=document.getElementById("registerName").value;

const email=document.getElementById("registerEmail").value;

const password=document.getElementById("registerPassword").value;


if(!name || !email || !password){

alert("Fill all fields");

return;

}


try{


const userCredential = await auth.createUserWithEmailAndPassword(email,password);


await db.collection("users").doc(userCredential.user.uid).set({

name:name,

email:email,

role:"student"

});


alert("Account created successfully");

showLogin();


}catch(error){

alert(error.message);

}


}async function loginUser(){

const email=document.getElementById("loginEmail").value;

const password=document.getElementById("loginPassword").value;


if(!email || !password){

alert("Enter email and password");

return;

}


try{


const result = await auth.signInWithEmailAndPassword(email,password);


const user = result.user;


const username = user.email.split("@")[0];


if(user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()){


localStorage.setItem("role","admin");

localStorage.setItem("name","Lewis");


window.location.href="admin-dashboard.html";


}else{


localStorage.setItem("role","student");

localStorage.setItem("name",username);


window.location.href="dashboard.html";


}



}catch(error){

alert("Login failed: "+error.message);

}


}



function resetPassword(){


const email=document.getElementById("loginEmail").value;


if(!email){

alert("Enter your email first");

return;

}


auth.sendPasswordResetEmail(email)

.then(()=>{

alert("Password reset email sent");

})

.catch(error=>{

alert(error.message);

});


}





/* Code rain animation */


const rain=document.getElementById("codeRain");


let chars="01{}[]<>;/AIpythonCS";


for(let i=0;i<40;i++){


let column=document.createElement("div");


column.style.position="absolute";

column.style.left=Math.random()*100+"%";

column.style.top="-200px";

column.style.fontSize="14px";


column.innerHTML=Array(30)

.fill(0)

.map(()=>chars[Math.floor(Math.random()*chars.length)])

.join("<br>");


column.style.animation=`fall ${5+Math.random()*8}s linear infinite`;


rain.appendChild(column);


}



const style=document.createElement("style");


style.innerHTML=`

@keyframes fall{

from{

transform:translateY(-200px);

}


to{

transform:translateY(120vh);

}


}

`;


document.head.appendChild(style);


</script>


</body>

</html>
