<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CS HUB | Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#050816;

--panel:#0d1225;

--panel2:#111935;

--border:rgba(255,255,255,.08);

--cyan:#31d7ff;

--green:#4cff9a;

--purple:#9b5cff;

--yellow:#ffbf3c;

--red:#ff5c7a;

--text:#ffffff;

--muted:#aab5d6;

}

body{

font-family:Inter,sans-serif;

background:var(--bg);

color:var(--text);

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

inset:0;

background:

radial-gradient(circle at 20% 20%,rgba(49,215,255,.12),transparent 28%),

radial-gradient(circle at 80% 15%,rgba(155,92,255,.10),transparent 24%),

radial-gradient(circle at 60% 80%,rgba(76,255,154,.06),transparent 30%);

z-index:-2;

animation:bgmove 15s ease-in-out infinite;

}

@keyframes bgmove{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-30px);

}

}

.layout{

display:flex;

min-height:100vh;

}

.sidebar{

width:270px;

background:#08101f;

border-right:1px solid var(--border);

padding:30px 20px;

position:fixed;

top:0;

bottom:0;

left:0;

overflow:auto;

}

.logo{

font-family:Orbitron,sans-serif;

font-size:42px;

font-weight:700;

line-height:1.05;

color:var(--cyan);

}

.logo span{

display:block;

color:var(--purple);

}

.adminlabel{

margin-top:12px;

font-family:JetBrains Mono,monospace;

font-size:13px;

letter-spacing:3px;

color:var(--cyan);

}

.menu{

margin-top:40px;

display:flex;

flex-direction:column;

gap:12px;

}

.menu a{

text-decoration:none;

color:var(--muted);

padding:14px 18px;

border-radius:14px;

border:1px solid transparent;

transition:.3s;

font-weight:500;

display:flex;

align-items:center;

gap:12px;

}

.menu a:hover{

background:rgba(49,215,255,.08);

color:white;

border-color:rgba(49,215,255,.35);

transform:translateX(5px);

}

.menu a.active{

background:rgba(49,215,255,.12);

border-color:rgba(49,215,255,.45);

color:white;

box-shadow:0 0 20px rgba(49,215,255,.18);

}

.main{

margin-left:270px;

width:100%;

padding:28px;

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

flex-wrap:wrap;

}

.user{

display:flex;

align-items:center;

gap:14px;

}

.avatar{

width:50px;

height:50px;

border-radius:50%;

background:linear-gradient(135deg,var(--cyan),var(--purple));

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

}

.username{

font-size:22px;

font-weight:700;

}

.email{

font-size:14px;

color:var(--muted);

}

.logout{

padding:12px 20px;

border:1px solid rgba(255,92,122,.45);

border-radius:14px;

color:#ff9db0;

text-decoration:none;

transition:.3s;

}

.logout:hover{

background:rgba(255,92,122,.15);

}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | CS Hub</title>

<link rel="stylesheet" href="assets/css/admin.css">

</head>

<body>

<div class="admin-container">

<header class="admin-header">

<div>
<h1>Admin Environment</h1>

<h2>
Welcome back, <span id="adminName">Admin Lewis</span>
</h2>

<p class="typing">
"Building the future of Computer Science, one idea at a time..."
</p>

</div>


<button class="logout">
Logout
</button>

</header>



<section class="dashboard-grid">


<div class="admin-card">
<h3>📚 Manage Units</h3>
<p>Add, edit and organize Computer Science units from Year 1 to Year 4.</p>
<button>Open</button>
</div>



<div class="admin-card">
<h3>📝 Notes Management</h3>
<p>Create and update professor-style notes, diagrams and explanations.</p>
<button>Open</button>
</div>



<div class="admin-card">
<h3>👥 Users</h3>
<p>Manage students, accounts and permissions.</p>
<button>Open</button>
</div>



<div class="admin-card">
<h3>🤖 AI Assistant</h3>
<p>Control AI learning features inside CS Hub.</p>
<button>Open</button>
</div>



<div class="admin-card">
<h3>📊 Analytics</h3>
<p>View activity, visitors and learning progress.</p>
<button>Open</button>
</div>



<div class="admin-card">
<h3>⚙️ Settings</h3>
<p>Configure your ecosystem settings.</p>
<button>Open</button>
</div>


</section>


</div>


</body>
</html>
