<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- CORE FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #030611;
            --sidebar: #060919;
            --card: rgba(10, 15, 36, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --blue: #3B82F6;
            --cyan: #06B6D4;
            --text: #ffffff;
            --dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; }

        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 25px 20px; display: flex; flex-direction: column; }
        .brand h1 { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--blue), var(--cyan)); -webkit-background-clip: text; color: transparent; letter-spacing: 1px; }
        .brand span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--blue); display: block; margin-top: 2px; }
        
        .menu { list-style: none; margin-top: 40px; display: flex; flex-direction: column; gap: 8px; }
        .menu a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--dim); text-decoration: none; font-size: 14px; border-radius: 8px; transition: all 0.2s; }
        .menu .active a, .menu a:hover { color: var(--text); background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }

        .main-panel { flex-grow: 1; display: flex; flex-direction: column; }
        .topbar { height: 75px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; background: rgba(6, 9, 25, 0.3); backdrop-filter: blur(10px); }
        .topbar h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; }

        .content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 16px; }
        .stat-title { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: #fff; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <h1>CS HUB</h1>
            <span>ADMIN PANEL</span>
        </div>
        <ul class="menu">
            <li class="active"><a href="admin-dashboard.html">📊 Dashboard</a></li>
            <li><a href="notes.html">📚 Notes Control</a></li>
            <!-- Corrected relative link for units page -->
            <li><a href="admin-units.html">🎓 Units Engine</a></li>
            <li><a href="ai-system.html">🤖 AI Console</a></li>
            <li><a href="revision.html">📝 Revision Repo</a></li>
        </ul>
    </aside>

    <!-- MAIN PANEL -->
    <main class="main-panel">
        <header class="topbar">
            <h2>System Control Dashboard</h2>
        </header>
        <div class="content">
            <div class="metrics-grid">
                <div class="stat-card">
                    <div class="stat-title">Total Academic Units</div>
                    <div class="stat-value" id="statUnits">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Dynamic Notes</div>
                    <div class="stat-value" id="statNotes">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Registered Active Users</div>
                    <div class="stat-value" id="statUsers">--</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
            authDomain: "cs-hub-7c97b.firebaseapp.com",
            projectId: "cs-hub-7c97b",
            storageBucket: "cs-hub-7c97b.firebasestorage.app",
            messagingSenderId: "76338162904",
            appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        document.addEventListener("DOMContentLoaded", () => {
            initMetrics();
        });

        function initMetrics() {
            db.collection("units").onSnapshot(s => { 
                document.getElementById("statUnits").textContent = s.empty ? "0" : s.size; 
            }, e => {
                document.getElementById("statUnits").textContent = "0"; 
            });

            db.collection("notes").onSnapshot(s => { 
                document.getElementById("statNotes").textContent = s.empty ? "0" : s.size; 
            }, e => {
                document.getElementById("statNotes").textContent = "0";
            });

            db.collection("users").onSnapshot(s => { 
                document.getElementById("statUsers").textContent = s.empty ? "0" : s.size; 
            }, e => {
                document.getElementById("statUsers").textContent = "0";
            });
        }
    </script>
</body>
</html>
