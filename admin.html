<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB Admin</title>
    <style>
        body { background: #000; color: #0F0; font-family: monospace; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 400px; border: 1px solid #0F0; padding: 20px; border-radius: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; background: #111; color: #0F0; border: 1px solid #0F0; border-radius: 5px; box-sizing: border-box; }
        button { background: #0F0; color: #000; font-weight: bold; cursor: pointer; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
        .del-btn { background: #F00; color: white; border: none; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box" id="loginBox">
    <h3>Admin Password</h3>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="checkPass()">Login</button>
</div>

<div class="box" id="adminBox" style="display:none;">
    <h3>Update Materials</h3>
    <input type="text" id="title" placeholder="Title">
    <input type="text" id="url" placeholder="Paste Link">
    <select id="cat" onchange="loadList()">
        <option value="books">Books & Guides</option>
        <option value="youtube">YouTube Tutorials</option>
        <option value="lectures">Lecture Videos</option>
        <option value="exams">Exams & CATs</option>
    </select>
    <button onclick="save()">Save to Site</button>
    <hr>
    <h3>Manage Items</h3>
    <div id="list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const app = initializeApp({
        apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
        databaseURL: "https://cs-hub-7c97b-default-rtdb.firebaseio.com",
        projectId: "cs-hub-7c97b"
    });
    const db = getDatabase(app);

    window.checkPass = () => {
        if(document.getElementById('pass').value === "stein15") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminBox').style.display = 'block';
            loadList();
        } else { alert("Wrong Password!"); }
    };

    window.save = () => {
        const title = document.getElementById('title').value;
        const url = document.getElementById('url').value;
        const cat = document.getElementById('cat').value;
        if(!title || !url) return alert("Fill all fields!");
        push(ref(db, 'materials/' + cat), { title, url }).then(() => {
            alert("Saved!");
            document.getElementById('title').value = '';
            document.getElementById('url').value = '';
        });
    };

    window.loadList = () => {
        const cat = document.getElementById('cat').value;
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "Loading...";
        onValue(ref(db, 'materials/' + cat), (snapshot) => {
            listDiv.innerHTML = "";
            const data = snapshot.val();
            for(let key in data) {
                listDiv.innerHTML += `<div class="item-row">${data[key].title} 
                <button class="del-btn" onclick="deleteItem('${cat}', '${key}')">Delete</button></div>`;
            }
        });
    };

    window.deleteItem = (cat, key) => {
        if(confirm("Are you sure you want to delete this?")) {
            remove(ref(db, 'materials/' + cat + '/' + key));
        }
    };
</script>
</body>
</html>
