<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CS HUB - AI System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030611;
            --sidebar-bg: #060919;
            --card-bg: rgba(10, 15, 36, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --blue: #3B82F6;
            --cyan: #06B6D4;
            --purple: #8B5CF6;
            --green: #22C55E;
            --yellow: #F59E0B;
            --red: #EF4444;
            --white: #ffffff;
            --dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { background-color: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; overflow-x: hidden; }

        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 25px 20px; transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000; overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 999; display: none; }
        .sidebar-overlay.active { display: block; }

        .main-content { padding: 20px; max-width: 1200px; margin: 0 auto; flex: 1; width: 100%; }
        .hero-terminal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .ai-container { display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
        .chat-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; min-height: 500px; }
        .chat-messages { flex: 1; overflow-y: auto; max-height: 400px; padding: 10px 0; }
        .bubble { background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
        .chat-input-area { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 14px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: white; }
        .btn-send { padding: 10px 20px; border-radius: 10px; border: none; background: var(--purple); color: white; cursor: pointer; }
        
        .admin-controls, .website-management { display: none; }
        .visible { display: block; }
        
        @media (max-width: 768px) { .ai-container { grid-template-columns: 1fr; } }
        @media (min-width: 1024px) { .sidebar { transform: translateX(0); position: sticky; height: 100vh; } }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><h1>CS HUB</h1><span>STUDENT PORTAL</span></div>
        <ul class="nav-menu" style="list-style:none; flex-grow:1; margin-top:20px;">
            <li class="nav-item"><a href="dashboard.html" style="color:var(--dim); text-decoration:none;">📊 Dashboard</a></li>
            <li class="nav-item active"><a href="ai-system.html" style="color:var(--white);">🤖 AI System</a></li>
        </ul>
        <div class="sidebar-profile">
            <div class="profile-name" id="userName">User</div>
            <div class="profile-role" id="userRole">Student</div>
        </div>
    </aside>

    <div class="main-content">
        <section class="hero-terminal">
            <h2>🤖 AI Learning Assistant</h2>
            <p>Ask questions, search the web, and manage your studies.</p>
        </section>

        <div class="ai-container">
            <div class="chat-section">
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai"><div class="bubble">Hello! I am ready to help. Type "Search: [query]" to find info online.</div></div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn-send" onclick="sendMessage()">Send</button>
                </div>
            </div>

            <div class="suggestions-panel">
                <div class="admin-controls" id="adminControls">
                    <h4>⚙️ Admin</h4>
                    <input type="text" id="aiApiKey" placeholder="API Key">
                    <button onclick="saveAIConfig()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Google Search Init -->
    <script async src="https://cse.google.com/cse.js?cx=67ff96fc83dc54b62"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
            authDomain: "cs-hub-7c97b.firebaseapp.com",
            projectId: "cs-hub-7c97b",
            storageBucket: "cs-hub-7c97b.firebasestorage.app",
            messagingSenderId: "76338162904",
            appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.href = "login.html"; return; }
            
            const ADMIN_EMAIL = "lewiseinstein15@gmail.com";
            if (user.email.toLowerCase().trim() === ADMIN_EMAIL) {
                document.getElementById('adminControls').classList.add('visible');
                document.getElementById('userRole').textContent = '🔑 Admin';
            }
            document.getElementById('userName').textContent = user.displayName || 'Student';
        });

        async function searchWeb(query) {
            const apiKey = document.getElementById('aiApiKey').value.trim();
            const cx = '67ff96fc83dc54b62'; // Your valid ID
            
            if (!apiKey) return "❌ Please enter a Google API key in Admin settings to use Search.";
            
            try {
                const url = `https://www.googleapis.com/customsearch/v1?key=${apiKey}&cx=${cx}&q=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.items) {
                    return data.items.slice(0, 3).map(item => `**${item.title}**\n${item.link}`).join('\n\n');
                }
                return "No results found.";
            } catch (e) { return "Search failed: " + e.message; }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';

            if (message.toLowerCase().startsWith('search:')) {
                const result = await searchWeb(message.substring(7));
                addMessage('ai', result);
            } else {
                addMessage('ai', "I am an AI assistant. Try typing 'Search: [your question]' to find answers!");
            }
        }

        function addMessage(type, content) {
            const container = document.getElementById('chatMessages');
            container.innerHTML += `<div class="message ${type}"><div class="bubble">${content}</div></div>`;
            container.scrollTop = container.scrollHeight;
        }

        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
    </script>
</body>
</html>
