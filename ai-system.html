<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .chat-container { height: 65vh; }
        .message { max-width: 85%; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200">
    <div class="max-w-5xl mx-auto p-6">
        <nav class="flex gap-6 mb-8 border-b border-gray-700 pb-4">
            <a href="index.html" class="hover:text-blue-400">Home</a>
            <a href="units.html" class="hover:text-blue-400">Units</a>
            <a href="labs.html" class="hover:text-blue-400">Labs</a>
            <a href="notes.html" class="hover:text-blue-400">Notes</a>
            <a href="ai-system.html" class="text-blue-400 font-bold">🤖 AI System</a>
        </nav>

        <h1 class="text-4xl font-bold mb-6 flex items-center gap-3">
            <span class="text-5xl">🧠</span> CS AI System
        </h1>

        <div class="bg-gray-900 rounded-3xl border border-gray-700 overflow-hidden">
            <div id="chat" class="chat-container p-6 overflow-y-auto space-y-6 bg-gray-950">
                <div class="message bg-gray-800 p-5 rounded-3xl rounded-tl-none">
                    Hello, I am CS AI System. How can I help you today?
                </div>
            </div>

            <div class="p-5 border-t border-gray-700 bg-gray-900 flex gap-3">
                <input id="userInput" type="text" 
                       class="flex-1 bg-gray-800 border border-gray-700 focus:border-blue-500 rounded-2xl px-5 py-4 outline-none"
                       placeholder="Ask anything about Computer Science...">
                <button onclick="sendMessage()" 
                        class="bg-blue-600 hover:bg-blue-700 px-6 rounded-2xl font-medium">
                    Send
                </button>
            </div>

            <div class="px-6 pb-6">
                <label class="cursor-pointer flex items-center justify-center gap-3 border border-dashed border-gray-600 hover:border-blue-500 rounded-2xl p-4">
                    <i class="fas fa-upload"></i>
                    <span>Upload file for analysis</span>
                    <input type="file" id="fileUpload" class="hidden">
                </label>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6J5oWJ_zYo-nWPliIazCfrA1jnSqFiIxzZp4R6Ve2I_LQ";
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message p-5 rounded-3xl ${isUser ? 'ml-auto bg-blue-600 text-white rounded-tr-none' : 'bg-gray-800 rounded-tl-none'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = "";

            const loading = document.createElement('div');
            loading.textContent = "Thinking...";
            loading.className = "message bg-gray-800 p-5 rounded-3xl rounded-tl-none italic";
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't process that.";
                loading.remove();
                addMessage(reply);
            } catch (err) {
                loading.remove();
                addMessage("Error connecting to AI. Please check your API key or try again later.");
            }
        }

        // Enter key support
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // File upload (basic simulation + prompt to AI)
        document.getElementById('fileUpload').addEventListener('change', async (e) => {
            if (e.target.files.length > 0) {
                const fileName = e.target.files[0].name;
                addMessage(`📁 Uploaded file: ${fileName}`, true);
                
                const loading = document.createElement('div');
                loading.textContent = "Analyzing file...";
                loading.className = "message bg-gray-800 p-5 rounded-3xl rounded-tl-none italic";
                chat.appendChild(loading);

                setTimeout(() => {
                    loading.remove();
                    addMessage(`I have analyzed "${fileName}". What would you like to know about this file?`);
                }, 1500);
            }
        });
    </script>
</body>
</html>
