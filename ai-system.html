<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { height: 100vh; margin: 0; background: #0a0a0a; }
        .chat-container { height: calc(100vh - 190px); }
        .user-bubble { background: #1e40af; color: white; border-bottom-right-radius: 4px; }
        .ai-bubble { background: #1f2937; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="text-gray-200 flex flex-col">
    <div class="bg-black border-b border-gray-800 p-4">
        <h1 class="text-xl font-bold flex items-center gap-3">
            <span class="text-3xl">🧠</span> CS AI System
        </h1>
    </div>

    <div id="chat" class="chat-container p-4 overflow-y-auto flex-1 space-y-6 bg-[#0a0a0a]">
        <div class="ai-bubble max-w-[80%] p-4 rounded-3xl rounded-bl-none">
            Hello, I am CS AI System. How can I help you today?
        </div>
    </div>

    <div class="bg-black border-t border-gray-800 p-4">
        <div class="flex gap-3">
            <input id="userInput" type="text" 
                   class="flex-1 bg-gray-900 border border-gray-700 focus:border-blue-500 rounded-3xl px-5 py-4 outline-none text-base"
                   placeholder="Type your message...">
            <button onclick="sendMessage()" 
                    class="bg-blue-600 hover:bg-blue-700 w-12 h-12 rounded-3xl flex items-center justify-center">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        
        <label class="mt-4 cursor-pointer flex items-center justify-center gap-2 text-sm border border-dashed border-gray-700 hover:border-gray-500 rounded-3xl p-4">
            <i class="fas fa-upload"></i>
            <span>Upload file for analysis</span>
            <input type="file" id="fileUpload" class="hidden">
        </label>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');

        const knowledge = {
            "hello": "Hello! How can I assist you with Computer Science today?",
            "big o": "Big O notation describes the worst-case time complexity of an algorithm.",
            "recursion": "Recursion is when a function calls itself to solve smaller instances of the same problem.",
            "default": "That's an interesting Computer Science question. Can you tell me more?"
        };

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `max-w-[80%] p-4 rounded-3xl ${isUser ? 'ml-auto user-bubble' : 'ai-bubble'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const text = userInput.value.trim().toLowerCase();
            if (!text) return;

            addMessage(userInput.value, true);
            userInput.value = "";

            setTimeout(() => {
                let reply = knowledge["default"];
                if (text.includes("hello") || text.includes("hi")) reply = knowledge["hello"];
                else if (text.includes("big o") || text.includes("complexity")) reply = knowledge["big o"];
                else if (text.includes("recursion")) reply = knowledge["recursion"];
                
                addMessage(reply);
            }, 600);
        }

        userInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

        document.getElementById('fileUpload').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                addMessage(`📁 Uploaded: ${e.target.files[0].name}`, true);
                setTimeout(() => addMessage("File received. What would you like me to analyze?"), 800);
            }
        });
    </script>
</body>
</html>
