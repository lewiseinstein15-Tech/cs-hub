<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { height: 100vh; margin: 0; }
        .chat-container { height: calc(100vh - 220px); }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 flex flex-col">
    <div class="p-4 border-b border-gray-700 bg-gray-900">
        <h1 class="text-2xl font-bold text-center">🧠 CS AI System</h1>
    </div>

    <div id="chat" class="chat-container p-4 overflow-y-auto flex-1 space-y-4 bg-gray-900">
        <div class="message bg-gray-800 p-4 rounded-2xl max-w-[80%]">
            Hello, I am CS AI System. How can I help you today?
        </div>
    </div>

    <div class="p-4 border-t border-gray-700 bg-gray-900">
        <div class="flex gap-2 mb-3">
            <input id="userInput" type="text" 
                   class="flex-1 bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-base"
                   placeholder="Ask anything about Computer Science...">
            <button onclick="sendMessage()" 
                    class="bg-blue-600 hover:bg-blue-700 px-6 rounded-xl font-medium">Send</button>
        </div>
        
        <label class="cursor-pointer flex items-center justify-center gap-2 text-sm border border-dashed border-gray-600 hover:border-blue-500 rounded-xl p-3">
            <i class="fas fa-upload"></i>
            <span>Upload file for analysis</span>
            <input type="file" id="fileUpload" class="hidden">
        </label>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6LOy2QVEXJlyVIV5euFIabAVQvzmTOgLnolGMj6uROP2g";
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message p-4 rounded-2xl ${isUser ? 'ml-auto bg-blue-600 text-white' : 'bg-gray-800'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = "";

            const loading = document.createElement('div');
            loading.textContent = "Thinking...";
            loading.className = "message bg-gray-800 p-4 rounded-2xl italic";
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                if (!res.ok) throw new Error("API Error");

                const data = await res.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "I received your message.";
                loading.remove();
                addMessage(reply);
            } catch (e) {
                loading.remove();
                addMessage("API connection failed. Please check your key or try again later.");
            }
        }

        userInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

        document.getElementById('fileUpload').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                addMessage(`📁 Uploaded: ${e.target.files[0].name}`, true);
                setTimeout(() => addMessage("File received. What would you like me to do with it?"), 800);
            }
        });
    </script>
</body>
</html>
