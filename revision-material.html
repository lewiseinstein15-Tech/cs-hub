<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB - Materials</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: monospace; color: #0F0; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        
        .container { position: relative; z-index: 2; width: 90%; max-width: 500px; margin: 20px auto; background: rgba(0, 0, 0, 0.8); padding: 20px; border: 1px solid #0F0; border-radius: 10px; }
        
        /* Admin Button at the very top */
        #admin-btn { display: block; background: #0F0; color: #000; text-align: center; padding: 10px; font-weight: bold; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
        
        h1 { text-align: center; border-bottom: 1px solid #0F0; margin-top: 0; }
        .category-box { margin-bottom: 20px; }
        h2 { font-size: 16px; margin-bottom: 5px; border-left: 3px solid #0F0; padding-left: 10px; }
        .list { min-height: 20px; }
        .item-link { display: block; padding: 8px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<div class="container">
    <!-- Admin Button is now at the top -->
    <a href="admin.html" id="admin-btn">OPEN ADMIN DASHBOARD</a>
    
    <h1>CS HUB</h1>
    
    <div class="category-box" id="books"><h2>📚 Books & Guides</h2><div class="list"></div></div>
    <div class="category-box" id="youtube"><h2>📺 YouTube Tutorials</h2><div class="list"></div></div>
    <div class="category-box" id="lectures"><h2>🎥 Lecture Videos</h2><div class="list"></div></div>
    <div class="category-box" id="exams"><h2>📝 Exams & CATs</h2><div class="list"></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
        authDomain: "cs-hub-7c97b.firebaseapp.com",
        databaseURL: "https://cs-hub-7c97b-default-rtdb.firebaseio.com",
        projectId: "cs-hub-7c97b",
        storageBucket: "cs-hub-7c97b.appspot.com",
        messagingSenderId: "76338162904",
        appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Matrix Background
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/14)).fill(1);
    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#0F0';
        drops.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(33+Math.random()*94), i*14, y*14);
            if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);

    // Load Data
    ['books', 'youtube', 'lectures', 'exams'].forEach(cat => {
        onValue(ref(db, 'materials/' + cat), (snapshot) => {
            const listDiv = document.querySelector(`#${cat} .list`);
            listDiv.innerHTML = "";
            const data = snapshot.val();
            for(let key in data) {
                listDiv.innerHTML += `<a href="${data[key].url}" class="item-link" target="_blank">▸ ${data[key].title}</a>`;
            }
        });
    });
</script>
</body>
</html>
