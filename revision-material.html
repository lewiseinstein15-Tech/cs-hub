<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CS HUB - Materials</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Courier New', monospace; color: #0F0; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        .container { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 20px; background: rgba(0,0,0,0.7); min-height: 100vh; }
        h1 { text-align: center; border-bottom: 2px solid #0F0; padding-bottom: 10px; }
        section { margin-bottom: 25px; }
        h2 { background: #111; padding: 10px; border-left: 5px solid #0F0; }
        .item-link { display: block; padding: 12px; background: rgba(0, 255, 0, 0.1); margin: 8px 0; text-decoration: none; color: #0F0; border: 1px solid #0F0; }
        #admin-link { color: #333; font-size: 10px; text-align: center; display: block; margin-top: 50px; }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div class="container">
    <h1>CS HUB - Materials</h1>
    <section id="books"><h2>📚 Books & Guides</h2><div class="list"></div></section>
    <section id="youtube"><h2>📺 YouTube Tutorials</h2><div class="list"></div></section>
    <section id="lectures"><h2>🎥 Lecture Videos</h2><div class="list"></div></section>
    <section id="exams"><h2>📝 Exams & CATs</h2><div class="list"></div></section>
    <!-- Secret Admin Entrance -->
    <a href="admin.html" id="admin-link">.</a>
</div>
<script type="module">
    // Matrix effect script same as before...
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const drops = Array(Math.floor(canvas.width/14)).fill(1);
    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0'; ctx.font = '14px monospace';
        drops.forEach((y, i) => {
            ctx.fillText(letters.charAt(Math.floor(Math.random()*letters.length)), i*14, y*14);
            if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);
    // Fetch data same as before...
</script>
</body>
</html>
