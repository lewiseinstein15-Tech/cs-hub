<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Materials - CS HUB</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        /* Admin Panel starts hidden */
        #adminControls { background: #1a1a1a; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: none; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #3B82F6; color: white; font-weight: bold; cursor: pointer; }
        .item-link { display: block; padding: 12px; background: white; margin: 5px 0; border-radius: 8px; border-left: 5px solid #3B82F6; text-decoration: none; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Revision Materials</h1>

    <!-- This section will only show for you -->
    <section id="adminControls">
        <h3>Admin Update Panel</h3>
        <input type="text" id="titleInput" placeholder="Material Title">
        <input type="text" id="linkInput" placeholder="Paste Google Drive/YouTube Link">
        <select id="category">
            <option value="books">Books & Guides</option>
            <option value="youtube">YouTube Tutorials</option>
            <option value="lectures">Lecture Videos</option>
            <option value="exams">Exams & CATs</option>
        </select>
        <button onclick="saveMaterial()">Add Material</button>
    </section>

    <section id="books"><h2>📚 Books & Guides</h2><div class="list"></div></section>
    <section id="youtube"><h2>📺 YouTube Tutorials</h2><div class="list"></div></section>
    <section id="lectures"><h2>🎥 Lecture Videos</h2><div class="list"></div></section>
    <section id="exams"><h2>📝 Exams & CATs</h2><div class="list"></div></section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
        authDomain: "cs-hub-7c97b.firebaseapp.com",
        databaseURL: "https://cs-hub-7c97b-default-rtdb.firebaseio.com",
        projectId: "cs-hub-7c97b",
        storageBucket: "cs-hub-7c97b.appspot.com",
        messagingSenderId: "76338162904",
        appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // RECOGNITION LOGIC
    onAuthStateChanged(auth, (user) => {
        const adminPanel = document.getElementById('adminControls');
        // Check if user exists AND if email matches your admin email
        if (user && user.email === "lewiseinstein5@gmail.com") {
            adminPanel.style.display = "block";
        } else {
            adminPanel.style.display = "none";
        }
    });

    window.saveMaterial = () => {
        const title = document.getElementById('titleInput').value;
        const url = document.getElementById('linkInput').value;
        const cat = document.getElementById('category').value;
        
        if(!title || !url) return alert("Please enter both a title and a link.");
        
        push(ref(db, 'materials/' + cat), { title, url })
            .then(() => alert("Added successfully!"))
            .catch((e) => alert("Error: " + e.message));
    };

    ['books', 'youtube', 'lectures', 'exams'].forEach(cat => {
        onValue(ref(db, 'materials/' + cat), (snapshot) => {
            const listDiv = document.querySelector(`#${cat} .list`);
            listDiv.innerHTML = "";
            const data = snapshot.val();
            for(let key in data) {
                listDiv.innerHTML += `<a href="${data[key].url}" class="item-link" target="_blank">${data[key].title}</a>`;
            }
        });
    });
</script>
</body>
</html>
