<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Materials - CS HUB</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Courier New', Courier, monospace; color: white; }
        
        /* Matrix Canvas Background */
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        
        .container { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 20px; background: rgba(0, 0, 0, 0.7); min-height: 100vh; }
        h1 { color: #0F0; text-align: center; border-bottom: 1px solid #0F0; padding-bottom: 10px; }
        section { margin-bottom: 25px; }
        h2 { color: #fff; background: #111; padding: 10px; border-left: 4px solid #0F0; font-size: 18px; }
        .item-link { display: block; padding: 12px; background: rgba(0, 255, 0, 0.1); margin: 8px 0; text-decoration: none; color: #0F0; border: 1px solid #0F0; transition: 0.3s; }
        .item-link:hover { background: #0F0; color: #000; }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="container">
    <h1>CS HUB - Materials</h1>
    <section id="books"><h2>📚 Books & Guides</h2><div class="list"></div></section>
    <section id="youtube"><h2>📺 YouTube Tutorials</h2><div class="list"></div></section>
    <section id="lectures"><h2>🎥 Lecture Videos</h2><div class="list"></div></section>
    <section id="exams"><h2>📝 Exams & CATs</h2><div class="list"></div></section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
        authDomain: "cs-hub-7c97b.firebaseapp.com",
        databaseURL: "https://cs-hub-7c97b-default-rtdb.firebaseio.com",
        projectId: "cs-hub-7c97b",
        storageBucket: "cs-hub-7c97b.appspot.com",
        appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Matrix Background Animation
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const fontSize = 14; const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 33);

    // Load Data for Students
    ['books', 'youtube', 'lectures', 'exams'].forEach(cat => {
        onValue(ref(db, 'materials/' + cat), (snapshot) => {
            const listDiv = document.querySelector(`#${cat} .list`);
            listDiv.innerHTML = "";
            const data = snapshot.val();
            for(let key in data) {
                listDiv.innerHTML += `<a href="${data[key].url}" class="item-link" target="_blank">${data[key].title}</a>`;
            }
        });
    });
</script>
</body>
</html>
