<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CS HUB — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#040a04; --green:#22ff66; --green-dim:#0e5c26; --green-glow:rgba(34,255,102,0.35); --text:#c9ffd8; --text-dim:rgba(201,255,216,0.5); --panel:rgba(10,25,14,0.55); --panel-border:rgba(34,255,102,0.25); }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{ width:100%;min-height:100%; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
  .grid-bg{ position:fixed;inset:0;z-index:0; background-image:linear-gradient(rgba(34,255,102,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(34,255,102,0.04) 1px, transparent 1px); background-size:38px 38px; pointer-events:none; }
  .glow-field{ position:fixed;inset:0;z-index:0; background:radial-gradient(ellipse 700px 500px at 15% 15%, rgba(34,255,102,0.08), transparent 60%), radial-gradient(ellipse 600px 500px at 85% 85%, rgba(34,255,102,0.06), transparent 60%); pointer-events:none; }
  .wrap{ position:relative;z-index:2; max-width:1180px;margin:0 auto; padding:28px 20px 60px; }
  .topbrand{ display:flex;align-items:center;gap:12px; margin-bottom:30px; }
  .mark{ width:46px;height:46px;border-radius:12px; border:1px solid var(--green); display:flex;align-items:center;justify-content:center; font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px; color:var(--green); box-shadow:0 0 18px var(--green-glow) inset, 0 0 12px var(--green-glow); }
  .topbrand h1{ font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700; letter-spacing:2px;color:var(--green); }
  .topbrand span{ display:block;font-size:10px;letter-spacing:2px;color:var(--text-dim); margin-top:2px;text-transform:uppercase; }
  .stage{ display:grid;grid-template-columns:1fr;gap:22px; }
  @media (min-width:900px){ .stage{grid-template-columns:1fr 420px;align-items:start;} }
  .console{ background:var(--panel); border:1px solid var(--panel-border); border-radius:16px; padding:20px 22px 26px; backdrop-filter:blur(6px); min-height:420px; }
  .console-head{ display:flex;align-items:center;justify-content:space-between; padding-bottom:14px;margin-bottom:16px; border-bottom:1px solid var(--panel-border); font-family:'JetBrains Mono',monospace; font-size:11px;letter-spacing:2px;color:var(--text-dim); }
  .console-dots{display:flex;gap:6px;} .console-dots span{width:7px;height:7px;border-radius:50%;background:var(--green-dim);}
  .console-dots span:first-child{background:var(--green);box-shadow:0 0 6px var(--green);}
  .console-log{ font-family:'JetBrains Mono',monospace; font-size:13px;line-height:2; display:flex;flex-direction:column;gap:2px; }
  .line{ opacity:0;transform:translateX(-8px); animation:lineIn 0.4s ease forwards; color:var(--text-dim); }
  .line.done{color:var(--text);} .line b{color:var(--green);font-weight:700;margin-right:2px;}
  @keyframes lineIn{to{opacity:1;transform:translateX(0);}}
  .cursor{ display:inline-block;width:8px;height:15px;background:var(--green); margin-left:4px;vertical-align:-2px; animation:blink 1s steps(1) infinite; }
  @keyframes blink{50%{opacity:0;}}
  .card{ background:var(--panel); border:1px solid var(--panel-border); border-radius:18px; padding:30px 26px 28px; backdrop-filter:blur(6px); box-shadow:0 0 60px rgba(34,255,102,0.06); }
  .card-logo{ width:64px;height:64px;margin:0 auto 16px; border-radius:50%;border:1px solid var(--green); display:flex;align-items:center;justify-content:center; font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;color:var(--green); box-shadow:0 0 24px var(--green-glow) inset, 0 0 20px var(--green-glow); }
  .card h2{ text-align:center;font-family:'JetBrains Mono',monospace; font-size:19px;letter-spacing:1.5px;color:var(--green); margin-bottom:4px; }
  .sub{ text-align:center;font-size:11px;letter-spacing:3px; color:var(--text-dim);margin-bottom:24px;text-transform:uppercase; }
  .field{margin-bottom:14px;position:relative;}
  .field input{ width:100%;padding:13px 14px 13px 42px; background:rgba(34,255,102,0.03); border:1px solid var(--panel-border); border-radius:10px; color:var(--text);font-size:14px;font-family:'Inter',sans-serif; outline:none; }
  .field input:focus{ border-color:var(--green);box-shadow:0 0 0 3px rgba(34,255,102,0.12); }
  .field .icon{ position:absolute;left:14px;top:50%;transform:translateY(-50%); color:var(--green-dim);font-size:15px;pointer-events:none; }
  .pw-toggle{ position:absolute;right:12px;top:50%;transform:translateY(-50%); background:none;border:none;color:var(--text-dim);cursor:pointer; font-size:11px;font-family:'JetBrains Mono',monospace; }
  .btn-main{ width:100%;padding:14px;border:none;border-radius:10px; background:linear-gradient(90deg,#16c94b,var(--green)); color:#04160a;font-weight:800;cursor:pointer;font-family:'JetBrains Mono',monospace;text-transform:uppercase; }
  .err-msg{ display:none;margin-top:12px;padding:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#ff9d9d;text-align:center;font-family:'JetBrains Mono',monospace; }
  .err-msg.show{display:block;}
  .hidden-panel{display:none;}
  .divider{margin:20px 0;text-align:center;color:var(--green-dim);font-size:10px;font-family:'JetBrains Mono',monospace;}
  .back-link{ background:none;border:none;color:var(--text-dim);cursor:pointer;margin-bottom:10px; }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-field"></div>

<div class="wrap">
  <div class="topbrand">
    <div class="mark">&lt;/&gt;</div>
    <div><h1>CS HUB</h1><span>Computer Science Hub</span></div>
  </div>

  <div class="stage">
    <div class="console">
      <div class="console-head"><span>CS HUB SYSTEM CONSOLE</span><div class="console-dots"><span></span><span></span><span></span></div></div>
      <div class="console-log" id="consoleLog"></div>
    </div>

    <div class="card">
      <div class="card-logo">&lt;/&gt;</div>
      <h2>COMPUTER SCIENCE HUB</h2>
      <div class="sub">Learn · Build · Innovate</div>

      <!-- Login -->
      <div id="loginPanel">
        <form id="loginForm">
          <div class="field"><span class="icon">👤</span><input type="email" id="email" placeholder="Email" required></div>
          <div class="field"><span class="icon">🔒</span><input type="password" id="password" placeholder="Password" required><button type="button" class="pw-toggle" id="pwToggle">SHOW</button></div>
          <button type="submit" class="btn-main">Login</button>
          <div class="err-msg" id="errMsg"></div>
        </form>
        <div class="divider">OR</div>
        <div class="sub" style="font-size:12px;">New here? <a href="#" id="signupLink" style="color:var(--green)">Create Account</a></div>
      </div>

      <!-- Signup -->
      <div id="signupPanel" class="hidden-panel">
        <button class="back-link" id="backFromSignup">← Back</button>
        <form id="signupForm">
          <div class="field"><span class="icon">👤</span><input type="email" id="signupEmail" placeholder="Email" required></div>
          <div class="field"><span class="icon">🔒</span><input type="password" id="signupPassword" placeholder="Password" required></div>
          <div class="field"><span class="icon">🔒</span><input type="password" id="confirmPassword" placeholder="Confirm Password" required></div>
          <button type="submit" class="btn-main">Create Account</button>
          <div class="err-msg" id="signupErrMsg"></div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const ADMIN_EMAILS = ["lewiseinstein15@gmail.com", "unscriptedusa@gmail.com"];
const firebaseConfig = {
  apiKey: "AIzaSyBpG07LjKWOSJYTT1X3S-Y5BUhLXNB3RLw",
  authDomain: "cs-hub-7c97b.firebaseapp.com",
  projectId: "cs-hub-7c97b",
  storageBucket: "cs-hub-7c97b.firebasestorage.app",
  messagingSenderId: "76338162904",
  appId: "1:76338162904:web:3be60e1952d49c8fb63bad"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// UI Logic
const log = document.getElementById('consoleLog');
["Initializing...", "Connecting to Database...", "System Ready."].forEach((text, i) => {
    setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'line done';
        el.innerHTML = '<b>></b> ' + text;
        log.appendChild(el);
    }, i * 500);
});

document.getElementById('signupLink').onclick = (e) => { e.preventDefault(); document.getElementById('loginPanel').classList.add('hidden-panel'); document.getElementById('signupPanel').classList.remove('hidden-panel'); };
document.getElementById('backFromSignup').onclick = () => { document.getElementById('signupPanel').classList.add('hidden-panel'); document.getElementById('loginPanel').classList.remove('hidden-panel'); };
document.getElementById('pwToggle').onclick = function(){ const p = document.getElementById('password'); p.type = p.type==='password'?'text':'password'; this.textContent = p.type==='password'?'SHOW':'HIDE'; };

// Auth Logic
async function redirect(email) {
    window.location.href = ADMIN_EMAILS.includes(email.toLowerCase()) ? "admin-dashboard.html" : "dashboard.html";
}

document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    try {
        const res = await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
        redirect(res.user.email);
    } catch(err) { document.getElementById('errMsg').textContent = err.message; document.getElementById('errMsg').classList.add('show'); }
};

document.getElementById('signupForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('signupEmail').value;
    const pass = document.getElementById('signupPassword').value;
    if(pass !== document.getElementById('confirmPassword').value) return alert("Passwords don't match");
    try {
        const res = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection("Users").doc(res.user.uid).set({ email, role: ADMIN_EMAILS.includes(email.toLowerCase()) ? "Admin" : "Student" });
        redirect(email);
    } catch(err) { document.getElementById('signupErrMsg').textContent = err.message; document.getElementById('signupErrMsg').classList.add('show'); }
};
</script>
</body>
</html>
