<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB - Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030611; --sidebar-bg: #060919; --card-bg: rgba(10, 15, 36, 0.7);
            --border: rgba(255, 255, 255, 0.08); --blue: #3B82F6; --cyan: #06B6D4;
            --purple: #8B5CF6; --green: #22C55E; --red: #EF4444; --white: #ffffff; --dim: rgba(255, 255, 255, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }
        
        /* Layout */
        .workspace { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .settings-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 30px; }
        
        /* Form Elements */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: var(--white); }
        
        .btn-generate { padding: 12px 24px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: white; cursor: pointer; width: 100%; font-weight: 600; }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border); opacity: 0; pointer-events: none; transition: 0.4s; z-index: 9999; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <main class="workspace">
        <div class="settings-card">
            <h2>⚙️ System Settings</h2>
            
            <div class="input-group">
                <label>Site Name</label>
                <input type="text" id="siteName" placeholder="CS HUB">
            </div>
            <div class="input-group">
                <label>Site Announcement</label>
                <input type="text" id="siteAnnouncement" placeholder="Update information...">
            </div>
            
            <button class="btn-generate" id="saveBtn" onclick="saveSettings()">🚀 Save & Generate Sync Code</button>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { /* Your Config Here */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Sanitize input to prevent basic XSS
        function sanitize(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function saveSettings() {
            const btn = document.getElementById('saveBtn');
            const siteName = sanitize(document.getElementById('siteName').value);
            const announcement = sanitize(document.getElementById('siteAnnouncement').value);

            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                await db.collection("settings").doc("siteConfig").set({
                    siteName,
                    announcement,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                showToast("✅ Settings saved securely!", "success");
            } catch (err) {
                showToast("❌ Error: " + err.message, "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "🚀 Save & Generate Sync Code";
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
