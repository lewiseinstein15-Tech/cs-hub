<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS HUB - Admin Sync</title>
    <style>
        :root { --bg: #030611; --card-bg: rgba(10, 15, 36, 0.7); --border: rgba(255, 255, 255, 0.08); --blue: #3B82F6; --white: #ffffff; --dim: rgba(255, 255, 255, 0.5); }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .settings-card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 18px; width: 100%; max-width: 500px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--dim); }
        input[type="text"], input[type="email"] { width: 100%; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; box-sizing: border-box; }
        .btn-gen { background: var(--blue); border: none; padding: 12px; border-radius: 8px; color: white; cursor: pointer; width: 100%; font-weight: bold; }
        textarea { width: 100%; height: 120px; margin-top: 15px; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; font-family: monospace; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="settings-card">
    <h2>Admin Sync Tool</h2>
    
    <div style="margin-bottom: 20px;">
        <input type="checkbox" id="maintenanceToggle">
        <label style="display:inline;">Enable Maintenance Mode</label>
    </div>

    <div class="input-group">
        <label>Admin Email</label>
        <input type="email" id="adminEmail" placeholder="email@example.com">
    </div>

    <div class="input-group">
        <label>Announcement</label>
        <input type="text" id="siteAnnouncement" placeholder="e.g. New update live!">
    </div>

    <button class="btn-gen" onclick="generateSyncCode()">Generate Sync Code</button>
    
    <textarea id="syncOutput" readonly placeholder="Your generated code will appear here..."></textarea>
    <p style="font-size: 11px; color: var(--dim);">Copy the generated code into your config.js file in GitHub.</p>
</div>

<script>
    function generateSyncCode() {
        const config = {
            maintenanceMode: document.getElementById('maintenanceToggle').checked,
            adminEmail: document.getElementById('adminEmail').value,
            announcement: document.getElementById('siteAnnouncement').value
        };
        
        // This generates the actual code you need to paste into your config.js
        const code = `const siteConfig = ${JSON.stringify(config, null, 2)};`;
        document.getElementById('syncOutput').value = code;
        
        alert("Code generated! Copy the text from the black box and paste it into config.js in your GitHub repository.");
    }
</script>

</body>
</html>
