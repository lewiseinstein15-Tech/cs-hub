<!-- Inside your settings.html script section -->
<script>
    function generateConfig() {
        const config = {
            maintenance: document.getElementById('maintenanceToggle').checked,
            email: document.getElementById('adminEmail').value,
            announcement: document.getElementById('siteAnnouncement').value,
            updatedAt: new Date().toISOString()
        };
        // Display the data for you to copy
        const jsonString = JSON.stringify(config, null, 2);
        document.getElementById('outputArea').value = jsonString;
        alert("Configuration generated! Copy the text below.");
    }
</script>

<!-- In your body, add this area -->
<div class="input-group">
    <button onclick="generateConfig()" class="btn-save">Generate Config JSON</button>
    <textarea id="outputArea" style="width:100%; height:100px; margin-top:10px; background:#000; color:#0f0;"></textarea>
</div>
